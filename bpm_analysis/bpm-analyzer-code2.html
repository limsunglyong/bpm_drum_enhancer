    <script>
        const audioDB = {
            init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('AudioDB', 1);
                    req.onupgradeneeded = e => {
                        e.target.result.createObjectStore('files');
                    };
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e.target.error);
                });
            },
            async load() {
                const db = await this.init();
                const tx = db.transaction('files', 'readonly');
                const req = tx.objectStore('files').get('currentAudio');
                return new Promise((resolve, reject) => {
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }
        };

        let globalAudioBuffer = null;
        let currentZoom = 1.0;
        let currentOffset = 0; // Starting sample index for horizontal scroll

        let audioContext;
        let gainNode;
        let sourceNode;
        let isPlaying = false;
        let isPaused = false;
        let startTime = 0;
        let animationId;

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "00:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function updatePlayButtonUI(isCurrentlyPlaying) {
            const icon = document.getElementById('play-icon');
            const btnPlay = document.getElementById('btn-play');
            if (isCurrentlyPlaying) {
                if (icon) icon.textContent = 'pause';
                if (btnPlay) btnPlay.classList.add('text-cyan-400', 'border-cyan-400/50');
            } else {
                if (icon) icon.textContent = 'play_arrow';
                if (btnPlay) btnPlay.classList.remove('text-cyan-400', 'border-cyan-400/50');
            }
        }

        function stopAudio() {
            if (sourceNode) {
                try { sourceNode.stop(); } catch (e) { }
                sourceNode = null;
            }
            isPlaying = false;
            isPaused = false;
            startTime = 0;
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            updatePlayButtonUI(false);
            cancelAnimationFrame(animationId);
            
            // Reset waveform visualization
            drawWaveform();

            const timelineDisp = document.getElementById('timeline-display');
            if (timelineDisp && globalAudioBuffer) {
                timelineDisp.textContent = `00:00 / ${formatTime(globalAudioBuffer.duration)}`;
            }
        }

        function updatePlaybackProgress() {
            if (!isPlaying || !globalAudioBuffer || isPaused) return;

            const currentTime = audioContext.currentTime - startTime;
            const timelineDisp = document.getElementById('timeline-display');
            if (timelineDisp) {
                timelineDisp.textContent = `${formatTime(currentTime)} / ${formatTime(globalAudioBuffer.duration)}`;
            }

            // Redraw waveform with current playback time to show playhead
            drawWaveform(currentTime);

            if (currentTime < globalAudioBuffer.duration) {
                animationId = requestAnimationFrame(updatePlaybackProgress);
            } else {
                stopAudio();
            }
        }

        async function analyzeKey(audioBuffer) {
            try {
                if (typeof Meyda === 'undefined') {
                    console.error('Meyda is not loaded');
                    return null;
                }

                const channelData = audioBuffer.getChannelData(0);
                const bufferSize = 4096;
                const hopSize = 2048;
                const chromaTotal = new Float32Array(12);
                let frameCount = 0;

                // Analyze frames across the buffer (limit to middle 30 seconds for performance if long)
                const startSample = Math.max(0, Math.floor(audioBuffer.length / 2) - (15 * audioBuffer.sampleRate));
                const endSample = Math.min(audioBuffer.length, startSample + (30 * audioBuffer.sampleRate));

                for (let i = startSample; i < endSample - bufferSize; i += hopSize) {
                    const frame = channelData.slice(i, i + bufferSize);
                    const chroma = Meyda.extract('chroma', frame);
                    if (chroma) {
                        for (let j = 0; j < 12; j++) {
                            chromaTotal[j] += chroma[j];
                        }
                        frameCount++;
                    }
                }

                if (frameCount === 0) return null;

                // Normalize
                for (let j = 0; j < 12; j++) {
                    chromaTotal[j] /= frameCount;
                }

                // Krumhansl-Schmuckler (KS) Profiles
                const majorProfile = [6.35, 2.23, 3.48, 2.33, 4.38, 4.09, 2.52, 5.19, 2.39, 3.66, 2.29, 2.88];
                const minorProfile = [6.33, 2.68, 3.52, 5.38, 2.60, 3.53, 2.54, 4.75, 3.98, 2.69, 3.34, 3.17];
                const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

                function correlate(v1, v2) {
                    const mean1 = v1.reduce((a, b) => a + b) / 12;
                    const mean2 = v2.reduce((a, b) => a + b) / 12;
                    let num = 0, den1 = 0, den2 = 0;
                    for (let i = 0; i < 12; i++) {
                        const d1 = v1[i] - mean1;
                        const d2 = v2[i] - mean2;
                        num += d1 * d2;
                        den1 += d1 * d1;
                        den2 += d2 * d2;
                    }
                    return num / Math.sqrt(den1 * den2);
                }

                let bestMatch = -1;
                let bestScore = -Infinity;
                let bestType = ''; // 'Major' or 'Minor'

                for (let i = 0; i < 12; i++) {
                    // Rotate profile for each key
                    const shiftedMajor = [...majorProfile.slice(12 - i), ...majorProfile.slice(0, 12 - i)];
                    const shiftedMinor = [...minorProfile.slice(12 - i), ...minorProfile.slice(0, 12 - i)];

                    const majorScore = correlate(chromaTotal, shiftedMajor);
                    const minorScore = correlate(chromaTotal, shiftedMinor);

                    if (majorScore > bestScore) {
                        bestScore = majorScore;
                        bestMatch = i;
                        bestType = 'Major';
                    }
                    if (minorScore > bestScore) {
                        bestScore = minorScore;
                        bestMatch = i;
                        bestType = 'Minor';
                    }
                }

                const keyResult = notes[bestMatch] + (bestType === 'Minor' ? 'm' : '');
                
                // Update UI
                const keyDisplay = document.getElementById('key-display');
                if (keyDisplay) {
                    keyDisplay.textContent = keyResult;
                }
                
                // Save to sessionStorage
                sessionStorage.setItem('detectedKey', keyResult);
                return keyResult;
            } catch (e) {
                console.error('Key analysis error:', e);
                return null;
            }
        }

        function drawWaveform(currentTime = null) {
            const canvas = document.getElementById('analysis-waveform');
            if (!canvas || !globalAudioBuffer) return;

            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const channels = globalAudioBuffer.numberOfChannels;
            const sampleRate = globalAudioBuffer.sampleRate;

            // --- Auto-scroll Logic ---
            // If playing and playhead exceeds 85% of the screen, scroll currentOffset
            if (currentTime !== null && isPlaying) {
                const visibleSamples = globalAudioBuffer.length / currentZoom;
                const step = visibleSamples / canvas.width;
                const currentSample = currentTime * sampleRate;
                let playheadX = (currentSample - currentOffset) / step;

                const scrollThreshold = canvas.width * 0.85;
                if (playheadX > scrollThreshold) {
                    currentOffset = currentSample - (scrollThreshold * step);
                    // Clamp to max duration
                    const maxOffset = globalAudioBuffer.length - visibleSamples;
                    if (currentOffset > maxOffset) currentOffset = Math.max(0, maxOffset);
                }
            }

            // --- Calculation Constants ---
            const visibleSamples = globalAudioBuffer.length / currentZoom;
            const step = visibleSamples / canvas.width;
            const visibleDuration = globalAudioBuffer.duration / currentZoom;
            const pixelsPerSecond = canvas.width / visibleDuration;
            const startTimeOnScreen = currentOffset / sampleRate;

            // --- Draw Time Ruler & Grid ---
            const intervals = [1, 2, 5, 10, 30, 60, 120, 300];
            let interval = intervals.find(inv => (inv * pixelsPerSecond) >= 80) || 600;

            ctx.save();
            const centerY = canvas.height / 2;
            
            // Calculate first tick to show
            let firstTick = Math.floor(startTimeOnScreen / interval) * interval;
            
            // 1. Draw Vertical Grid Lines (Dashed)
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            for (let t = firstTick; t <= globalAudioBuffer.duration; t += interval) {
                const x = (t - startTimeOnScreen) * pixelsPerSecond;
                if (x > canvas.width) break;
                if (x < 0) continue;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            // 2. Draw Ticks and Labels (Solid)
            ctx.setLineDash([]);
            ctx.font = 'italic 200 10px "Plus Jakarta Sans"';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.textBaseline = 'middle';
            
            for (let t = firstTick; t <= globalAudioBuffer.duration; t += interval) {
                const x = (t - startTimeOnScreen) * pixelsPerSecond;
                if (x > canvas.width) break;
                if (x < 0) continue;

                ctx.beginPath();
                ctx.moveTo(x, centerY - 10);
                ctx.lineTo(x, centerY + 10);
                ctx.stroke();
                ctx.fillText(`${Math.floor(t)}s`, x + 5, centerY);
            }
            ctx.restore();

            // --- Calculation for Playhead ---
            let playheadX = -1;
            if (currentTime !== null) {
                playheadX = (currentTime * sampleRate - currentOffset) / step;
            }

            // Internal function to draw waveform bars
            const drawBars = (isPlayed) => {
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                if (isPlayed) {
                    gradient.addColorStop(0, '#10b981'); // Emerald Green
                    gradient.addColorStop(1, '#84cc16'); // Lime Green
                    ctx.shadowColor = 'rgba(16, 185, 129, 0.6)';
                    ctx.shadowBlur = 10;
                } else {
                    gradient.addColorStop(0, 'rgba(16, 185, 129, 0.2)');
                    gradient.addColorStop(1, 'rgba(132, 204, 22, 0.2)');
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                }
                ctx.fillStyle = gradient;

                for (let c = 0; c < Math.min(channels, 2); c++) {
                    const data = globalAudioBuffer.getChannelData(c);
                    const isBottomHalf = (channels > 1 && c === 1);
                    const halfHeight = channels > 1 ? canvas.height / 2 : canvas.height;
                    const offsetY = isBottomHalf ? halfHeight : 0;
                    const amp = halfHeight / 2;
                    const center = offsetY + amp;

                    for (let i = 0; i < canvas.width; i++) {
                        let min = 1.0;
                        let max = -1.0;
                        let startSampleIdx = Math.floor(currentOffset + (i * step));

                        if (startSampleIdx >= data.length) break;
                        if (startSampleIdx < 0) continue;

                        for (let j = 0; j < Math.ceil(step) && (startSampleIdx + j) < data.length; j++) {
                            const datum = data[startSampleIdx + j];
                            if (datum < min) min = datum;
                            if (datum > max) max = datum;
                        }

                        const y = center - (max * amp);
                        const h = Math.max(1, (max - min) * amp);
                        ctx.fillRect(i, y, 1, h);
                    }
                }
            };

            // Rendering logic based on playhead position
            if (playheadX > 0 && playheadX < canvas.width) {
                // Draw played part
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, 0, playheadX, canvas.height);
                ctx.clip();
                drawBars(true);
                ctx.restore();

                // Draw unplayed part
                ctx.save();
                ctx.beginPath();
                ctx.rect(playheadX, 0, canvas.width - playheadX, canvas.height);
                ctx.clip();
                drawBars(false);
                ctx.restore();

                // Draw Playhead Line
                ctx.save();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.moveTo(playheadX, 0);
                ctx.lineTo(playheadX, canvas.height);
                ctx.stroke();
                ctx.restore();
            } else if (playheadX >= canvas.width) {
                drawBars(true);
            } else {
                drawBars(false);
            }

            // --- Draw Center Separator ---
            if (channels > 1) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, centerY);
                ctx.lineTo(canvas.width, centerY);
                ctx.stroke();
            }
        }


        document.addEventListener('DOMContentLoaded', async () => {
            // 볼륨 슬라이더 상태 동기화
            const volControl = document.getElementById('volume-control');
            if (volControl) {
                const savedVolume = localStorage.getItem('masterVolume');
                if (savedVolume !== null) {
                    volControl.value = savedVolume;
                }
                const updateSliderBg = (slider) => {
                    const value = (slider.value - slider.min) / (slider.max - slider.min) * 100;
                    slider.style.background = `linear-gradient(to right, #00f0ff 0%, #00f0ff ${value}%, #272a2c ${value}%, #272a2c 100%)`;
                };
                updateSliderBg(volControl);
                volControl.addEventListener('input', (e) => {
                    localStorage.setItem('masterVolume', e.target.value);
                    updateSliderBg(e.target);
                });
            }

            const name = sessionStorage.getItem('uploadedAudioName');

            // Update UI with file name
            const fileNameDisplay = document.getElementById('file-name-display');
            if (fileNameDisplay && name) {
                fileNameDisplay.textContent = name;
            }

            try {
                // Fetch the File from IndexedDB
                const file = await audioDB.load();
                if (!file) {
                    console.log('No uploaded audio found in IndexedDB.');
                    return;
                }

                // Parse ID3 Tags using jsmediatags
                if (window.jsmediatags) {
                    window.jsmediatags.read(file, {
                        onSuccess: function (tag) {
                            const tags = tag.tags;
                            if (tags.title) document.getElementById('track-title').textContent = tags.title;
                            else document.getElementById('track-title').textContent = name || 'Unknown Title';

                            if (tags.artist) document.getElementById('track-artist').textContent = tags.artist;

                            if (tags.picture) {
                                const data = tags.picture.data;
                                const format = tags.picture.format;
                                const blob = new Blob([new Uint8Array(data)], { type: format });
                                const url = URL.createObjectURL(blob);
                                const albumArt = document.getElementById('album-art');
                                const placeholder = document.getElementById('album-art-placeholder');
                                if (albumArt && placeholder) {
                                    albumArt.src = url;
                                    albumArt.classList.remove('hidden');
                                    placeholder.classList.add('hidden');
                                }
                            }
                        },
                        onError: function (error) {
                            console.log('Error parsing tags:', error);
                            document.getElementById('track-title').textContent = name || 'Unknown Title';
                        }
                    });
                } else {
                    document.getElementById('track-title').textContent = name || 'Unknown Title';
                }

                const arrayBuffer = await file.arrayBuffer();

                // Decode to AudioBuffer
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                // Update duration
                const durationDisplay = document.getElementById('duration-display');
                const trackLength = document.getElementById('track-length');
                if (durationDisplay || trackLength) {
                    const min = Math.floor(audioBuffer.duration / 60);
                    const sec = Math.floor(audioBuffer.duration % 60);
                    const formatted = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
                    if (durationDisplay) durationDisplay.textContent = formatted;
                    if (trackLength) trackLength.textContent = formatted;
                }

                // Update format
                const trackFormat = document.getElementById('track-format');
                if (trackFormat && file.name) {
                    const ext = file.name.split('.').pop().toUpperCase();
                    trackFormat.textContent = ext;
                }

                // Update Sample Rate
                const sampleRateDisplay = document.getElementById('sample-rate-display');
                if (sampleRateDisplay) {
                    const srkHz = (audioBuffer.sampleRate / 1000).toFixed(1);
                    sampleRateDisplay.textContent = `${srkHz} kHz`;
                }

                // Store globally and draw waveform
                globalAudioBuffer = audioBuffer;
                drawWaveform();

                // Initialize GainNode
                if (!gainNode) {
                    gainNode = audioContext.createGain();
                    gainNode.connect(audioContext.destination);
                    const volControl = document.getElementById('volume-control');
                    if (volControl) gainNode.gain.value = volControl.value;
                }

                // Initial Timeline Display
                const timelineDisp = document.getElementById('timeline-display');
                if (timelineDisp) {
                    timelineDisp.textContent = `00:00 / ${formatTime(audioBuffer.duration)}`;
                }

                const canvas = document.getElementById('analysis-waveform');
                if (canvas) {
                    // Wheel Zoom
                    canvas.addEventListener('wheel', (e) => {
                        e.preventDefault();
                        if (e.deltaY < 0) {
                            currentZoom *= 1.2;
                        } else {
                            currentZoom /= 1.2;
                            if (currentZoom < 1.0) currentZoom = 1.0;
                        }
                        
                        // Ensure offset is clamped after zoom change
                        const visibleSamples = globalAudioBuffer.length / currentZoom;
                        const maxOffset = globalAudioBuffer.length - visibleSamples;
                        if (currentOffset > maxOffset) currentOffset = Math.max(0, maxOffset);
                        
                        drawWaveform();
                    }, { passive: false });

                    // Mouse Drag to Scroll
                    let isDragging = false;
                    let startX = 0;
                    let startOffset = 0;

                    canvas.addEventListener('mousedown', (e) => {
                        if (e.button === 0) { // Left click
                            isDragging = true;
                            startX = e.clientX;
                            startOffset = currentOffset;
                            canvas.style.cursor = 'grabbing';
                        }
                    });

                    window.addEventListener('mousemove', (e) => {
                        if (isDragging) {
                            const dx = e.clientX - startX;
                            const visibleSamples = globalAudioBuffer.length / currentZoom;
                            const samplesPerPixel = visibleSamples / canvas.width;
                            
                            currentOffset = startOffset - (dx * samplesPerPixel);
                            
                            // Clamp Offset
                            const maxOffset = globalAudioBuffer.length - visibleSamples;
                            if (currentOffset < 0) currentOffset = 0;
                            if (currentOffset > maxOffset) currentOffset = Math.max(0, maxOffset);
                            
                            drawWaveform();
                        }
                    });

                    window.addEventListener('mouseup', () => {
                        isDragging = false;
                        canvas.style.cursor = 'crosshair';
                    });
                }

                // --- Simple BPM Detection Algorithm ---
                // We use an offline audio context to apply a lowpass filter and find peaks


                // --- Improved BPM Detection Algorithm (Histogram-based) ---
                const offlineCtx = new OfflineAudioContext(1, audioBuffer.length, audioBuffer.sampleRate);
                const offlineSource = offlineCtx.createBufferSource();
                offlineSource.buffer = audioBuffer;

                const lowpass = offlineCtx.createBiquadFilter();
                lowpass.type = 'lowpass';
                lowpass.frequency.value = 150; 

                const highpass = offlineCtx.createBiquadFilter();
                highpass.type = 'highpass';
                highpass.frequency.value = 40;

                offlineSource.connect(lowpass);
                lowpass.connect(highpass);
                highpass.connect(offlineCtx.destination);
                offlineSource.start(0);

                const renderedBuffer = await offlineCtx.startRendering();
                const data = renderedBuffer.getChannelData(0);

                // Find peaks
                const peaks = [];
                const threshold = 0.3; 
                const minDistance = Math.floor(audioBuffer.sampleRate * 0.3); // 200 BPM max

                for (let i = 0; i < data.length; i++) {
                    if (Math.abs(data[i]) > threshold) {
                        peaks.push(i);
                        i += minDistance;
                    }
                }

                let bpm = 120.00;
                if (peaks.length >= 2) {
                    const tempos = [];
                    for (let i = 1; i < peaks.length; i++) {
                        const interval = peaks[i] - peaks[i - 1];
                        let theoreticalBPM = 60 / (interval / audioBuffer.sampleRate);

                        // Normalize BPM to common range [70, 160]
                        while (theoreticalBPM < 70) theoreticalBPM *= 2;
                        while (theoreticalBPM > 160) theoreticalBPM /= 2;

                        tempos.push(theoreticalBPM);
                    }

                    // Histogram bins
                    const binSize = 1;
                    const bins = {};
                    tempos.forEach(t => {
                        const bin = Math.round(t / binSize) * binSize;
                        bins[bin] = (bins[bin] || 0) + 1;
                    });
                    
                    let maxCount = 0;
                    let modeBin = 120;
                    for (const b in bins) {
                        if (bins[b] > maxCount) {
                            maxCount = bins[b];
                            modeBin = parseFloat(b);
                        }
                    }

                    // 최빈값 중심에서 80% 구간의 값들 (상하위 10% 제외)
                    const cluster = tempos.filter(t => Math.abs(t - modeBin) <= 3);
                    cluster.sort((a, b) => a - b);
                    const trimCount = Math.floor(cluster.length * 0.1);
                    const core = cluster.slice(trimCount, cluster.length - trimCount);
                    
                    if (core.length > 0) {
                        bpm = core.reduce((a, b) => a + b, 0) / core.length;
                    } else {
                        bpm = modeBin;
                    }
                    
                    // 히스토그램 그리기
                    const canvas = document.getElementById('tempo-histogram');
                    if (canvas) {
                        const ctx = canvas.getContext('2d');
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        
                        const binKeys = Object.keys(bins).map(Number).sort((a,b)=>a-b);
                        if(binKeys.length > 0) {
                            const minBin = binKeys[0];
                            const maxBin = binKeys[binKeys.length - 1];
                            const paddingX = 20; // 좌우 여백 확보
                            const paddingYTop = 10;
                            const paddingYBottom = 25; // X축 라벨을 위한 하단 여백
                            const drawWidth = canvas.width - paddingX * 2;
                            const drawHeight = canvas.height - paddingYTop - paddingYBottom;
                            
                            const barWidth = drawWidth / Math.max(1, (maxBin - minBin + 1));
                            
                            binKeys.forEach(bin => {
                                const count = bins[bin];
                                const h = (count / maxCount) * drawHeight;
                                const x = paddingX + (bin - minBin) * barWidth;
                                const y = canvas.height - paddingYBottom - h;
                                
                                // 최빈값 주변 80% 구간 하이라이트
                                if (Math.abs(bin - modeBin) <= 3) {
                                    ctx.fillStyle = '#66ff8f'; // secondary color
                                } else {
                                    ctx.fillStyle = '#006970'; // inverse-primary
                                }
                                
                                ctx.fillRect(x, y, Math.max(1, barWidth - 1), h);
                            });

                            // X축 (BPM) 라벨 그리기
                            ctx.fillStyle = '#b9cacb'; // on-surface-variant (text color)
                            ctx.font = '10px Inter, sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'top';

                            // 텍스트 겹침 방지를 위한 라벨 간격(step) 계산
                            // 숫자 하나의 대략적인 픽셀 너비(~25px)를 기준으로 스텝 결정
                            const labelStep = Math.max(1, Math.ceil(25 / barWidth));

                            for (let i = 0; i <= (maxBin - minBin); i++) {
                                if (i % labelStep === 0) {
                                    const bin = minBin + i;
                                    const x = paddingX + i * barWidth + barWidth / 2;
                                    const y = canvas.height - paddingYBottom + 6;
                                    ctx.fillText(Math.round(bin), x, y);
                                }
                            }
                        }
                    }
                }

                // sessionStorage에 저장
                sessionStorage.setItem('globalTempo', bpm.toFixed(2));

                // Update BPM UI
                const bpmDisplay = document.getElementById('bpm-display');
                if (bpmDisplay) {
                    bpmDisplay.textContent = bpm.toFixed(2);
                }

                // --- Key Detection ---
                await analyzeKey(audioBuffer);

                // --- Playback Event Listeners ---
                const btnPlay = document.getElementById('btn-play');
                const btnStop = document.getElementById('btn-stop');
                const volControl = document.getElementById('volume-control');

                if (btnPlay) {
                    btnPlay.addEventListener('click', async () => {
                        if (!globalAudioBuffer) return;

                        if (!isPlaying && !isPaused) {
                            if (audioContext.state === 'suspended') await audioContext.resume();

                            sourceNode = audioContext.createBufferSource();
                            sourceNode.buffer = globalAudioBuffer;
                            sourceNode.connect(gainNode);

                            startTime = audioContext.currentTime;
                            sourceNode.start();

                            isPlaying = true;
                            updatePlayButtonUI(true);
                            updatePlaybackProgress();

                            sourceNode.onended = () => {
                                if (!isPaused) stopAudio();
                            };
                        }
                        else if (isPlaying && !isPaused) {
                            await audioContext.suspend();
                            isPaused = true;
                            updatePlayButtonUI(false);
                        }
                        else if (isPaused) {
                            await audioContext.resume();
                            isPaused = false;
                            updatePlayButtonUI(true);
                            updatePlaybackProgress();
                        }
                    });
                }

                if (btnStop) {
                    btnStop.addEventListener('click', stopAudio);
                }

                if (volControl) {
                    volControl.addEventListener('input', (e) => {
                        if (gainNode) {
                            gainNode.gain.value = e.target.value;
                        }
                    });
                }

            } catch (error) {
                console.error('Error fetching or analyzing audio:', error);
            }
        });
    </script>
